<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cafe Compass | Cafe Details</title>

  <!-- Web font loading for a consistent visual style with the home page. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="details-page">
  <main class="details-layout">
    <a href="/" class="back-link">Back to map</a>

    <section class="details-card">
      <h1 id="cafe-name">Loading cafe...</h1>
      <p id="cafe-address"></p>

      <dl class="details-grid">
        <div>
          <dt>Neighborhood</dt>
          <dd id="cafe-neighborhood">-</dd>
        </div>
        <div>
          <dt>Coordinates</dt>
          <dd id="cafe-coords">-</dd>
        </div>
        <div>
          <dt>Phone</dt>
          <dd id="cafe-phone">-</dd>
        </div>
        <div>
          <dt>Website</dt>
          <dd id="cafe-website">-</dd>
        </div>
        <div>
          <dt>Opening Hours</dt>
          <dd id="cafe-hours">-</dd>
        </div>
      </dl>
    </section>

    <section class="mini-map-wrapper">
      <div id="mini-map"></div>
    </section>

    <p id="details-status" class="status" role="status" aria-live="polite"></p>
  </main>

  <script src="details.js" defer></script>
</body>
</html>
